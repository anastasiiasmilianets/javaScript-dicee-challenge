<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8" />
  <title>Dice game</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Unna:ital@1&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <h1>Refresh Me</h1>

    <button id="roll-btn">🎲 Roll the dice 🎲</button>

    <div class="score">
      <h2>Game score</h2>
      <p id="score1">0</p>
      <p id="score2">0</p>
    </div>

    <div class="dice">
      <p>Player 1</p>
      <img class="img1" src="images/dice6.png" />
    </div>

    <div class="dice">
      <p>Player 2</p>
      <img class="img2" src="images/dice6.png" />
    </div>
  </div>

  <footer> made by Anastasiia Smilianets </footer>
  <script src="index.js"></script>
</body>

</html>
